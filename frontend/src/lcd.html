<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BrewPiLess reporting for duty!</title>
        <meta name="apple-mobile-web-app-title" content="BrewPiLess" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <script src="bundle.js"></script>
        <link
            rel="icon"
            href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
        />
    </head>
    <style>
        .lcddisplay {
            width: 280px;
            height: 90px;
            margin-left: auto;
            margin-right: auto;
            margin-top: 5px;
            background: #000000;
            background: linear-gradient(
                to bottom,
                #000000 2%,
                #2b2b2b 11%,
                #212121 54%,
                #212121 92%,
                #000000 100%
            );
            box-shadow: inset 1px 1px 5px #333333;
            border: 2px solid #333;
            border-radius: 2px;
        }

        .lcddisplay .lcd-text {
            float: left;
            margin: 5px 16px;
            font-size: 16px;
        }

        .lcd-line {
            float: left;
            clear: left;
            font-weight: normal;
            font-style: normal;
            font-family: "Courier New", Courier, monospace;
            color: #ffff00;
            white-space: pre;
        }

        .dropdown {
            position: absolute;
            left: 2px;
            top: 2px;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            background-color: #f9f9f9;
            min-width: 160px;
            overflow: auto;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border: 1px solid;
        }

        .dropdown a:hover {
            background-color: #f1f1f1;
        }

        .show {
            display: block;
        }
    </style>

    <body data-page="lcd">
        <div id="lcd" class="lcddisplay">
            <span class="lcd-text">
                <span class="lcd-line" id="lcd-line-0">Mode Fridge Const.</span>
                <span class="lcd-line" id="lcd-line-1">Beer --.- --.- °C</span>
                <span class="lcd-line" id="lcd-line-2">Fridge 0.5 1.0 °C</span>
                <span class="lcd-line" id="lcd-line-3">Idling for 01m49</span>
            </span>
        </div>
        <div class="dropdown">
            <div id="myDropdown" class="dropdown-content">
                <a href="/">Main Page</a>
                <a href="/control.htm">Control</a>
                <a href="/logging.htm">Logs</a>
                <a href="/setup.htm">Device Setup</a>
                <a href="/config.htm">System Config</a>
                <a href="/gravity.htm">Gravity</a>
                <a href="/pressure.htm">Pressure</a>
            </div>
        </div>
    </body>
</html>
