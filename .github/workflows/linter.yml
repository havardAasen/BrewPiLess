name: Linter

on:
  push:

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Prettier
        working-directory: frontend
        run: |
          npm run pretty
          npx prettier --check src/{edit,lcd,testcmd}.html


  ts-eslint:
    name: ESLint TypeScript files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src/js/*ts src/js/**/*ts


  clang-tidy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Generate compile database
        run: pio run -t compiledb -e clangtidy_native

      - name: Run clang-tidy
        run: pio check -e clangtidy_native
